<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmulatorJS GBA</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: white;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }

      #shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      #toolbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #111;
        border-bottom: 1px solid #222;
      }

      #gameWrap {
        flex: 1 1 auto;
        min-height: 0;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      .btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #5865f2;
        cursor: pointer;
        font-weight: 600;
      }

      .muted {
        color: #bbb;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="toolbar">
        <label class="btn">
          Choose GBA ROM
          <input id="romInput" type="file" accept=".gba,.zip" style="display:none" />
        </label>
        <div id="status" class="muted">No ROM selected</div>
      </div>
      <div id="gameWrap">
        <div id="game"></div>
      </div>
    </div>

    <script>
      const romInput = document.getElementById("romInput");
      const statusEl = document.getElementById("status");

      let loaderAdded = false;
      let currentBlobUrl = null;

      function bootRom(file) {
        if (!file) return;

        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
          currentBlobUrl = null;
        }

        currentBlobUrl = URL.createObjectURL(file);
        statusEl.textContent = `Selected: ${file.name}`;

        const gameEl = document.getElementById("game");
        gameEl.innerHTML = "";

        window.EJS_player = "#game";
        window.EJS_core = "gba";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_gameUrl = currentBlobUrl;
        window.EJS_threads = false;
        window.EJS_startOnLoaded = true;

        if (!loaderAdded) {
          const script = document.createElement("script");
          script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
          script.onload = () => {
            statusEl.textContent = `Booting: ${file.name}`;
          };
          script.onerror = () => {
            statusEl.textContent = "Failed to load EmulatorJS";
          };
          document.body.appendChild(script);
          loaderAdded = true;
        } else {
          // Reload the iframe page to reinitialize cleanly with the selected ROM.
          location.reload();
        }

        sessionStorage.setItem(
          "emulatorjs_pending_rom",
          JSON.stringify({
            name: file.name,
            url: currentBlobUrl
          })
        );
      }

      const pending = sessionStorage.getItem("emulatorjs_pending_rom");
      if (pending) {
        try {
          const parsed = JSON.parse(pending);
          if (parsed?.url) {
            currentBlobUrl = parsed.url;
            statusEl.textContent = `Booting: ${parsed.name}`;

            window.EJS_player = "#game";
            window.EJS_core = "gba";
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_gameUrl = parsed.url;
            window.EJS_threads = false;
            window.EJS_startOnLoaded = true;

            const script = document.createElement("script");
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            script.onerror = () => {
              statusEl.textContent = "Failed to load EmulatorJS";
            };
            document.body.appendChild(script);

            sessionStorage.removeItem("emulatorjs_pending_rom");
            loaderAdded = true;
          }
        } catch (e) {
          console.error(e);
          sessionStorage.removeItem("emulatorjs_pending_rom");
        }
      }

      romInput.addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        bootRom(file);
      });
    </script>
  </body>
</html>
