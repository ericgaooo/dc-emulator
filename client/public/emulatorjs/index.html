<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmulatorJS GBA</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: white;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }

      #shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      #toolbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #111;
        border-bottom: 1px solid #222;
      }

      #gameWrap {
        flex: 1 1 auto;
        min-height: 0;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      .btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        background: #5865f2;
        cursor: pointer;
        font-weight: 600;
      }

      .muted {
        color: #bbb;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="toolbar">
        <label class="btn">
          Choose GBA ROM
          <input id="romInput" type="file" accept=".gba,.zip" style="display:none" />
        </label>
        <div id="status" class="muted">No ROM selected</div>
      </div>
      <div id="gameWrap">
        <div id="game"></div>
      </div>
    </div>

    <script>
      const romInput = document.getElementById("romInput");
      const statusEl = document.getElementById("status");

      let currentBlobUrl = null;

      function bootRom(file) {
        if (!file) return;

        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
          currentBlobUrl = null;
        }

        currentBlobUrl = URL.createObjectURL(file);
        statusEl.textContent = `Booting: ${file.name}`;

        const gameEl = document.getElementById("game");
        gameEl.innerHTML = "";

        window.EJS_player = "#game";
        window.EJS_core = "gba";
        window.EJS_pathtodata = "/emulatorjs/data/";
        window.EJS_gameUrl = currentBlobUrl;
        window.EJS_threads = false;
        window.EJS_startOnLoaded = true;

        const oldLoader = document.getElementById("ejs-loader");
        if (oldLoader) oldLoader.remove();

        const script = document.createElement("script");
        script.id = "ejs-loader";
        script.src = "/emulatorjs/data/loader.js";
        script.onload = () => {
          statusEl.textContent = `Running: ${file.name}`;
        };
        script.onerror = () => {
          statusEl.textContent = "Failed to load local EmulatorJS assets";
        };
        document.body.appendChild(script);
      }

      romInput.addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        bootRom(file);
      });
    </script>
  </body>
</html>
